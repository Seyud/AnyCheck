import groovy.json.JsonSlurper
import org.apache.tools.ant.filters.FixCrLfFilter

import java.nio.file.Files
import java.nio.file.Paths


plugins {
    id 'com.android.application'
}
apply from: rootProject.file('magisk_module/config.gradle')

boolean isHookKernel = false
android {
    namespace 'com.runtime.magisk'
    compileSdkVersion rootProject.ext.compileSdkVersion
    ndkVersion = rootProject.ext.ndkVersion
    defaultConfig {
        applicationId "com.runtime.magisk"
        versionCode 1
        versionName "1.0.0"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        multiDexEnabled false
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }

        buildConfigField "String", "tagPackageName", "\"$moduleTagApkName\""
        buildConfigField "String", "RuntimeDexName", "\"$moduleDexName\""

        externalNativeBuild {
            cmake {
                arguments "-DHomePath=${project.rootProject.projectDir}",
                        "-DSO_NAME=${moduleLibraryName}",
                        "-DTAG_APP_NAME=${moduleTagApkName}",
                        "-DRUNTIME_KERNEL_NAME=${moduleKernelName}",
                        "-DRUNTIME_JAR_NAME=${moduleDexName}"
            }
        }

    }

    externalNativeBuild {
        cmake {
            //path "src/main/CMakeLists.txt"
            path "src/main/jni/CMakeLists.txt"
            version = "3.22.1+"
        }
    }
    buildTypes {
        debug {
            minifyEnabled false
            externalNativeBuild {
                cmake {
                    arguments "-DZHENXI_BUILD_TYPE=DEBUG"
                }
            }
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            externalNativeBuild {
                cmake {
                    arguments "-DZHENXI_BUILD_TYPE=Release"
                }
            }
        }
    }
    buildFeatures {
        buildConfig = true
        viewBinding true
        prefab true
        aidl true
    }
    lintOptions {
        // true--错误发生后停止gradle构建
        abortOnError false
        // true--只报告error
        ignoreWarnings true
    }
    packagingOptions {
        exclude 'lib/mips64/liblog.so'
        exclude 'lib/arm64-v8a/liblog.so'
        exclude 'lib/armeabi-v7a/liblog.so'
        exclude 'lib/x86/liblog.so'
        exclude 'lib/x86_64/liblog.so'
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    sourceSets {
        main.java.srcDirs += 'src/main/java'
    }


}

tasks.register('executeAllReleaseTasks') {
    dependsOn 'pushRelease'
    dependsOn 'flashRelease'
    dependsOn 'flashAndRebootRelease'
    doLast {
        println 'Successfully executed all release tasks.'
    }
}
