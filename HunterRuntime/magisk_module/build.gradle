repositories {
    mavenLocal()
}


afterEvaluate {
    android.applicationVariants.forEach { variant ->
        def variantCapped = variant.name.capitalize()
        println "variantCapped -> $variantCapped"
        def variantLowered = variant.name.toLowerCase()
        println "variantLowered -> $variantLowered"
        def zipName = "${magiskModuleId.replace('_', '-')}-${moduleVersion}-${variantLowered}.zip"
        println "zipName -> $zipName"
        println "MagiskOut -> $MagiskOut"
        def magiskDir = file("$MagiskOut/magisk_module_$variantLowered")
        println "magiskDir -> $magiskDir"
        def outZipPath = file("$MagiskOut/$zipName")
        println "OutZipPath -> $outZipPath"
        println "------------------------------------------------"
        //clean work dir
        if (MagiskOut.exists()) {
            MagiskOut.deleteDir()
            MagiskOut.mkdirs()
        }
        tasks.register("prepareMagiskFiles${variantCapped}", Sync) {
            dependsOn("assemble$variantCapped")

            def templatePath = "$rootDir/magisk_module/template/magisk_module"

            into magiskDir
            from(templatePath) {
                exclude 'module.prop'
            }
            from(templatePath) {
                include 'module.prop'
                expand([
                        id         : magiskModuleId,
                        name       : moduleName,
                        version    : moduleVersion,
                        versionCode: moduleVersionCode.toString(),
                        author     : moduleAuthor,
                        description: moduleDescription,
                ])
                filter(FixCrLfFilter.class,
                        eol: FixCrLfFilter.CrLf.newInstance("lf"))
            }
            from("$buildDir/intermediates/stripped_native_libs/$variantLowered/out/lib") {
                into 'lib'
            }
            def dexOutPath
            if (variantLowered == "release") {
                dexOutPath = layout.buildDirectory.dir("intermediates/dex/$variantCapped/minify${variantCapped}WithR8")
            } else {
                dexOutPath = layout.buildDirectory.dir("intermediates/dex/$variantCapped/mergeDex$variantCapped")
            }
            doLast {
                println "start doLast ,pre so "
                file("$magiskDir/zygisk").mkdirs()
                fileTree("$magiskDir/lib").visit { f ->
                    if (!f.directory) return
                    def srcPath = Paths.get("${f.file.absolutePath}/lib${moduleLibraryName}.so")
                    def dstPath = Paths.get("$magiskDir/zygisk/${f.path}.so")
                    Files.move(srcPath, dstPath)
                }
                println "start doLast ,pre dex "
                new File("$magiskDir/lib").deleteDir()
                //init base dir
                file("$magiskDir/system/framework").mkdirs()
                def dexFiles = fileTree(dexOutPath).files.findAll { it.name.endsWith('.dex') }
                println "magisk module dex size -> $dexFiles "
                if (dexFiles.size() == 0) {
                    throw new RuntimeException("Magisk module dex size is 0. No dex files found.")
                }
                def outputJar = "$magiskDir/system/framework/${moduleDexName}.jar"
                ant.jar(destfile: outputJar) {
                    dexFiles.each { fileset(file: it) }
                }
                println "Created framework JAR: $outputJar"
                if (isHookKernel) {
                    //注入驱动文件
                    def kernelFile = file("${projectDir}/src/main/kernel/${moduleKernelName}.ko")
                    if (!kernelFile.exists()) {
                        println ">>>>>>>> runtime build not find kernel file " + kernelFile.path
                        throw new RuntimeException("runtime build not find kernel file " + kernelFile.path)
                    }
                    copy {
                        from kernelFile
                        into magiskDir
                    }
                    println ">>>>>>>> runtime build  kernel file copy success ! " + kernelFile.path
                }
            }
        }

        tasks.register("zip${variantCapped}", Zip) {
            dependsOn("prepareMagiskFiles${variantCapped}")
            from magiskDir
            archiveFileName.set(zipName)
            //destinationDirectory.set(outDir)
            destinationDirectory.set(file(MagiskOut))
            println "println task zip${variantCapped}"
        }

        tasks.register("push${variantCapped}", Exec) {
            dependsOn("zip${variantCapped}")
            workingDir MagiskOut
            commandLine android.adbExecutable, "push", outZipPath, "/data/local/tmp/"
            println "println task push ${variantCapped}"
        }

        tasks.register("flash${variantCapped}", Exec) {
            dependsOn("push${variantCapped}")
            commandLine android.adbExecutable, "shell", "su", "-c",
                    "magisk --install-module /data/local/tmp/${zipName}"
            println "println task flash${variantCapped}"
        }

        tasks.register("flashAndReboot${variantCapped}", Exec) {
            dependsOn("flash${variantCapped}")
            commandLine android.adbExecutable, "shell", "reboot"
            //commandLine android.adbExecutable, "shell", "su", "-c", "/system/bin/svc", "power", "reboot"
            println "println task flashAndReboot${variantCapped}"
        }

        //variant.assembleProvider.get().finalizedBy("zip${variantCapped}")
        variant.assembleProvider.get().finalizedBy("flashAndReboot${variantCapped}")
    }
}